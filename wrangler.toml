name = "aquaflow-pro"
main = ".open-next/worker.js"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npx opennextjs-cloudflare build"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[routes]]
pattern = "sw.sportsflow.best"
custom_domain = true

